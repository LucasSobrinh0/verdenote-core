spring:
  datasource:
    url: jdbc:h2:mem:verdenote;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    remember-me:
      key: test-remember-me-key

server:
  servlet:
    session:
      cookie:
        secure: false

verdenote:
  cookies:
    secure: false
  cors:
    allowed-origins: http://localhost:3000
  realtime:
    service-secret: dev-realtime-secret-change-me
