spring:
  application:
    name: verdenote-core
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/verdenote}
    username: ${DB_USERNAME:verdenote}
    password: ${DB_PASSWORD:verdenote}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  security:
    remember-me:
      key: ${VERDENOTE_REMEMBER_ME_KEY:change-me-in-production}

server:
  servlet:
    session:
      timeout: 2h
      cookie:
        name: VERDENOTE_SESSION
        http-only: true
        secure: true
        same-site: lax

verdenote:
  cors:
    allowed-origins: ${VERDENOTE_CORS_ALLOWED_ORIGINS:http://localhost:13000}
  cookies:
    secure: ${VERDENOTE_COOKIE_SECURE:true}
  remember-me:
    cookie-name: VERDENOTE_REMEMBER_ME
    validity-seconds: 2592000
  login-attempt:
    max-attempts: 5
    lock-minutes: 15
  realtime:
    service-secret: ${VERDENOTE_REALTIME_SERVICE_SECRET:dev-realtime-secret-change-me}

---
spring:
  config:
    activate:
      on-profile: local

server:
  servlet:
    session:
      cookie:
        secure: false

verdenote:
  cookies:
    secure: false
