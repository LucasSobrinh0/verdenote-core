services:
  verdenote-core:
    build:
      context: .
    container_name: verdenote-core
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: ${DB_URL:-jdbc:postgresql://host.docker.internal:5432/verdenote}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      VERDENOTE_REMEMBER_ME_KEY: dev-remember-me-key-change-before-production
      VERDENOTE_REALTIME_SERVICE_SECRET: dev-realtime-service-secret-change-before-production
      VERDENOTE_CORS_ALLOWED_ORIGINS: https://verdenote.sobrinholabs.tech
      VERDENOTE_COOKIE_SECURE: "true"
      DEBUG: "false"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
