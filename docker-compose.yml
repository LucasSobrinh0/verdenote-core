services:
  postgres:
    image: postgres:16-alpine
    container_name: verdenote-core-postgres
    environment:
      POSTGRES_DB: verdenote
      POSTGRES_USER: verdenote
      POSTGRES_PASSWORD: verdenote_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verdenote -d verdenote"]
      interval: 10s
      timeout: 5s
      retries: 5

  verdenote-core:
    build:
      context: .
    container_name: verdenote-core
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/verdenote
      DB_USERNAME: verdenote
      DB_PASSWORD: verdenote_dev_password
      VERDENOTE_REMEMBER_ME_KEY: dev-remember-me-key-change-before-production
      VERDENOTE_REALTIME_SERVICE_SECRET: dev-realtime-service-secret-change-before-production
      VERDENOTE_CORS_ALLOWED_ORIGINS: http://localhost:3000
      VERDENOTE_COOKIE_SECURE: "false"
      DEBUG: "false"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
